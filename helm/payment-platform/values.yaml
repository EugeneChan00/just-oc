# Global configuration
global:
  environment: production
  awsRegion: us-east-1
  imageRegistry: "123456789.dkr.ecr.us-east-1.amazonaws.com"
  logLevel: info
  externalDomain: api.pay.example.com

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "5000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1s"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls:
    secretName: pay-tls-cert

# Service mesh / mTLS
mtls:
  enabled: true
  # Istio or Linkerd service mesh for mutual TLS between services

# API Gateway
apiGateway:
  enabled: true
  replicaCount: 3
  image: api-gateway:1.0.0
  service:
    type: ClusterIP
    port: 8080
  ingress:
    host: api.pay.example.com
    path: /api/v1
    pathType: Prefix
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
      ephemeral-storage: 1Gi
    limits:
      cpu: 4000m
      memory: 8Gi
      ephemeral-storage: 2Gi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  autoscaling:
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Percent
            value: 100
            periodSeconds: 30
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
  circuitBreaker:
    enabled: true
    failureThreshold: 50
    successThreshold: 3
    timeout: 5000
    resetTimeout: 30000
  pdb:
    enabled: true
    minAvailable: 2
  podDisruptionBudget:
    maxUnavailable: 1

# Tokenization Service (PCI-DSS CDE)
tokenization:
  enabled: true
  replicaCount: 3
  image: tokenization:1.0.0
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
      ephemeral-storage: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi
      ephemeral-storage: 4Gi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilization: 70
  vault:
    enabled: true
    # Vault agent annotation for secret injection
    secretName: tokenization-secrets
  pdb:
    enabled: true
    minAvailable: 2

# Transaction Service (PCI-DSS CDE)
transaction:
  enabled: true
  replicaCount: 5
  image: transaction:1.0.0
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 4000m
      memory: 8Gi
      ephemeral-storage: 2Gi
    limits:
      cpu: 8000m
      memory: 16Gi
      ephemeral-storage: 4Gi
  hpa:
    enabled: true
    minReplicas: 5
    maxReplicas: 30
    targetCPUUtilization: 70
  circuitBreaker:
    enabled: true
    failureThreshold: 50
    successThreshold: 3
    timeout: 3000
    resetTimeout: 30000
  pdb:
    enabled: true
    minAvailable: 3

# Refund Service
refund:
  enabled: true
  replicaCount: 2
  image: refund:1.0.0
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70

# Subscription Service
subscription:
  enabled: true
  replicaCount: 2
  image: subscription:1.0.0
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 2000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70

# Ledger Service
ledger:
  enabled: true
  replicaCount: 3
  image: ledger:1.0.0
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 2000m
      memory: 8Gi
    limits:
      cpu: 4000m
      memory: 16Gi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilization: 70

# Notification Service
notification:
  enabled: true
  replicaCount: 2
  image: notification:1.0.0
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilization: 70
  webhook:
    retryAttempts: 3
    retryDelaySeconds: 5
    timeoutSeconds: 30

# Fraud Detection Service
fraud:
  enabled: true
  replicaCount: 2
  image: fraud-detection:1.0.0
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 4000m
      memory: 16Gi
      # GPU for ML inference (optional)
      nvidia.com/gpu: 1
    limits:
      cpu: 8000m
      memory: 32Gi
      nvidia.com/gpu: 2
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilization: 70
  model:
    name: fraud-model-v2
    version: "20260401"
    scoringTimeout: 100

# Kafka (AWS MSK) - External managed
kafka:
  enabled: false  # Use AWS MSK, not embedded

# PostgreSQL - External managed via RDS
postgresql:
  enabled: false  # Use RDS PostgreSQL 15.4

# Redis - External managed via ElastiCache
redis:
  enabled: false  # Use ElastiCache

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 9090
  grafana:
    enabled: true
  alertManager:
    enabled: true

# Logging
logging:
  enabled: true
  loki:
    enabled: true
    url: http://loki:3100
  retention:
    days: 30

# Service account
serviceAccount:
  create: true
  name: payment-platform
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/payment-platform-irsa

# Network policies
networkPolicies:
  enabled: true
  # Restrict traffic between namespaces
  # Only services within the platform can communicate
