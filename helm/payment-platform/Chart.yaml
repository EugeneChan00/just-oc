apiVersion: v2
name: payment-platform
description: Payment Processing Microservices Platform
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: api-gateway
    condition: api-gateway.enabled
  - name: tokenization
    condition: tokenization.enabled
  - name: transaction
    condition: transaction.enabled
  - name: refund
    condition: refund.enabled
  - name: subscription
    condition: subscription.enabled
  - name: ledger
    condition: ledger.enabled
  - name: notification
    condition: notification.enabled
  - name: fraud
    condition: fraud.enabled
