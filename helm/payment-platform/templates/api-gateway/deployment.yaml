apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace | default "api-gateway-ns" }}
  labels:
    app.kubernetes.io/name: payment-platform
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: payment-platform
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-platform
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-platform
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default "payment-platform" }}
      containers:
        - name: api-gateway
          image: {{ .Values.global.imageRegistry }}/{{ .Values.apiGateway.image }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: KAFKA_BROKERS
              value: "b-1.kafka.abcdef.us-east-1.msk.amazonaws.com:9092,b-2.kafka.abcdef.us-east-1.msk.amazonaws.com:9092,b-3.kafka.abcdef.us-east-1.msk.amazonaws.com:9092"
          resources:
            requests:
              cpu: "2000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
